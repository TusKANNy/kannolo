name =          "grid_dragon_hnsw_adaptive"
title =         "Grid search on Dragon HNSW (MS MARCO) - adaptive early termination"
description =   "Grid search on plain f16 Dragon HNSW index on MS MARCO v1"
dataset =       "dragon"
dataset-type =  "dense"
value-type =    "f16"
build-command = "./target/release/hnsw_build"
query-command = "./target/release/hnsw_search"
encoder       = "plain"
graph-type =    "standard"

[settings]
k =             10
num-runs =      1
NUMA =          "numactl --physcpubind='0' --localalloc"
build =         false
metric =        ""

[folder]
data =          "~/knn_datasets/dense_datasets/msmarco_v1_passage/dragon"
index =         ""
qrels_path =    ""
experiment =    "."

[filename]
dataset =       "dataset.npy"
queries =       "queries.npy"
groundtruth =   "groundtruth.npy"
doc_ids =       ""
query_ids =     ""
index =         "dragon"

[indexing_parameters]
m =      [32]
ef-construction = [200]
metric = ["dotproduct"]

[querying_parameters]
early-termination = ["distance-adaptive"]
ef-search = [10, 11, 12, 13, 14, 15, 16, 17, 18]
lambda = [0.03, 0.04, 0.05, 0.06, 0.07, 0.08, 0.09, 0.10, 0.11, 0.12, 0.13, 0.14, 0.15, 0.16, 0.17, 0.18, 0.19]
