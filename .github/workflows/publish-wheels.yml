name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build wheels on Linux
    runs-on: ubuntu-latest
    env:
      # +avx2,+fma,+f16c: vectors stored as f16 internally; F16C (VCVTPH2PS) is required
      # to vectorise the f16→f32 conversion in the distance kernel. F16C is always
      # present on AVX2 machines (Ivy Bridge 2012+), so this raises no minimum requirement.
      RUSTFLAGS: "-C target-feature=+avx2,+fma,+f16c"
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          maturin-version: latest
          command: build
          args: --release -o dist -i 3.10 3.11 3.12 3.13
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: dist/

  build-macos:
    name: Build wheels on macOS
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          # AVX2+FMA+F16C for Intel Macs (Haswell / 2013+); F16C needed for f16 distance kernel
          - target: x86_64-apple-darwin
            rustflags: "-C target-feature=+avx2,+fma,+f16c"
          # Apple Silicon — NEON is always on by default, no extra flags needed
          - target: aarch64-apple-darwin
            rustflags: ""
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          maturin-version: latest
          command: build
          args: --release -o dist -i 3.10 3.11 3.12 3.13 --target ${{ matrix.target }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install maturin
      - run: maturin sdist -o dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: [build-linux, build-macos, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_PASSWORD }}
