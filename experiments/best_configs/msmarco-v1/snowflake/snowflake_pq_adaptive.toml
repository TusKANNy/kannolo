name =          "snowflake_pq_hnsw_adaptive_best"
title =         "Search dense HNSWM on MS MARCO Snowflake (PQ-128) - adaptive best"
description =   "Best adaptive configs from grid_snowflake_pq_hnsw_adaptive (2026-06-22)"
dataset =       "snowflake_pq"
dataset-type =  "dense"
value-type =    "f32"
build-command = "./target/release/hnsw_build"
query-command = "./target/release/hnsw_search"
encoder       = "pq"
graph-type =    "standard"

[settings]
k =             10
num-runs =      1
NUMA =          "numactl --physcpubind='0' --localalloc"
build =         false
metric =        ""

[folder]
data =          "~/knn_datasets/dense_datasets/msmarco_v1_passage/snowflake/"
index =         "~/knn_indexes/dense_datasets/msmarco_v1_passage/snowflake/"
qrels_path =    ""
experiment =    "."

[filename]
dataset =       "documents.npy"
queries =       "queries_dev.npy"
groundtruth =   "groundtruth.tsv"
doc_ids =       ""
query_ids =     ""
index =         "hnsw_snowflake_pq"

[pq_parameters]
pq-subspaces = 128

[indexing_parameters]
m =               32
ef-construction = 200
metric =          "dotproduct"

